# codex_harness — Codex 플러그인 매니페스트 (placeholder)
#
# Status: 이 파일은 Phase C 빌더가 _workspace/01_codex_primitives.md의
# 매니페스트 schema 실측 결과에 따라 갱신합니다. 현재는 가설 스켈레톤.

name = "codex-harness"
version = "0.1.0-pre"
description = "Agent Team & Skill Architect — Codex port of revfactory/harness"
license = "Apache-2.0"
homepage = "https://github.com/<your-org>/codex_harness"
repository = "https://github.com/<your-org>/codex_harness"

# --- 가설 키 (실측 후 수정) ---
# Codex 플러그인의 정확한 매니페스트 키는 `codex plugin --help` 및
# `codex plugin marketplace --help` 실측이 필요합니다.

[[prompts]]
name = "harness"
file = "prompts/harness.md"
trigger = "/harness"
description = "도메인 분석 + 에이전트 팀/스킬 자동 구성 (메타 하네스 진입점)"

[[prompts]]
name = "codex-harness-orchestrator"
file = "prompts/codex-harness-orchestrator.md"
description = "전체 파이프라인 오케스트레이션"

[mcp_servers.team]
command = "node"
args = ["./mcp-team-server/dist/index.js"]
description = "Agent Team 에뮬레이션 (TeamCreate/SendMessage/TaskCreate 등 MCP 도구 제공)"

[agents]
directory = "agents/"
